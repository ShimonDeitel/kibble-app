name: Kibble
options:
  bundleIdPrefix: com.shimondeitel.kibblelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Kibble:
    type: application
    platform: iOS
    sources:
      - path: Kibble
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kibblelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Kibble/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KibbleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KibbleTests
      - path: Kibble.storekit
    dependencies:
      - target: Kibble
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kibblelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KibbleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KibbleUITests
    dependencies:
      - target: Kibble
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kibblelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Kibble:
    build:
      targets:
        Kibble: all
        KibbleTests: [test]
        KibbleUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Kibble.storekit
    test:
      config: Debug
      storeKitConfiguration: Kibble.storekit
      targets:
        - KibbleTests
        - KibbleUITests
    archive:
      config: Release
